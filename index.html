<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אלעדים על המפה - המערכת המלאה</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        :root { --main-green: #008069; --bg-chat: #efe7de; --msg-me: #dcf8c6; --msg-other: #ffffff; }
        
        /* סידור המסך הראשי */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; display: flex; overflow: hidden; background: #f0f2f5; }
        
        #main-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-chat); 
            position: relative; 
            transition: all 0.3s ease; /* אנימציה חלקה כשנפתח השרשור */
        }
        
        /* סיידבר שרשור (Thread) - עכשיו הוא מחוץ לזרימה הרגילה עד שהוא נפתח */
        #thread-sidebar { 
            width: 0; /* מתחיל ברוחב 0 כדי שלא יתפוס מקום לבן */
            height: 100%; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            box-shadow: -2px 0 5px rgba(0,0,0,0.1); 
            z-index: 100; 
            overflow: hidden;
            transition: width 0.3s ease; /* פתיחה חלקה */
            border-right: none;
        }

        /* כשהשרשור פתוח */
        #thread-sidebar.open {
            width: 350px; /* הרוחב של השרשור */
            border-right: 1px solid #ddd;
        }

        header { background: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; min-height: 60px; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 85%; padding: 10px; border-radius: 8px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); cursor: pointer; }
        .msg.me { align-self: flex-end; background: var(--msg-me); }
        .msg.other { align-self: flex-start; background: var(--msg-other); }
        .msg-user { font-size: 0.75rem; font-weight: bold; color: #00a884; display: block; margin-bottom: 3px; }
        
        .msg-tools { display: flex; gap: 10px; margin-top: 8px; font-size: 0.8rem; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 5px; opacity: 0.7; }
        .msg-tools span:hover { opacity: 1; cursor: pointer; color: var(--main-green); }
        
        .reaction-area { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .reac-tag { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 2px 6px; font-size: 0.75rem; display: flex; align-items: center; gap: 3px; }

        footer { padding: 10px; background: #f0f2f5; display: flex; gap: 8px; align-items: center; border-top: 1px solid #ddd; }
        .input-wrap { flex: 1; background: white; border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; }
        input { border: none; flex: 1; padding: 8px; outline: none; font-size: 1rem; background: transparent; }
        .btn-circle { background: var(--main-green); color: white; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        
        #thread-header { padding: 15px; background: #075e54; color: white; display: flex; justify-content: space-between; align-items: center; min-width: 350px; }
        #thread-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: var(--bg-chat); min-width: 350px; }
    </style>
</head>
<body>

<div id="main-container">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://k9361839-oss.github.io/The-Channel/אלעדים על המפה.jpg" style="width:45px; height:45px; border-radius:50%; object-fit: cover;">
            <div><b style="font-size:1.1rem;">אלעדים על המפה</b><br><small id="status">התחבר לצ'אט</small></div>
        </div>
        <div id="auth-area"><button onclick="login()" style="padding:8px 15px; border-radius:20px; cursor:pointer;">כניסה 🔑</button></div>
    </header>

    <div id="chat-flow"></div>

    <footer>
        <button style="font-size:1.5rem; background:none; border:none; cursor:pointer;" onclick="addEmoji('main-input')">😊</button>
        <div class="input-wrap"><input type="text" id="main-input" placeholder="הודעה חדשה..." onkeypress="if(event.key==='Enter') sendMessage('main-input', 'messages')"></div>
        <button class="btn-circle" onclick="sendMessage('main-input', 'messages')">➤</button>
    </footer>
</div>

<div id="thread-sidebar">
    <div id="thread-header">
        <b>שרשור תגובות</b>
        <button onclick="closeThread()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">×</button>
    </div>
    <div id="thread-msgs"></div>
    <footer style="min-width: 350px;">
        <button style="font-size:1.5rem; background:none; border:none; cursor:pointer;" onclick="addEmoji('thread-input')">💬</button>
        <div class="input-wrap"><input type="text" id="thread-input" placeholder="הגב בשרשור..." onkeypress="if(event.key==='Enter') sendReply()"></div>
        <button class="btn-circle" onclick="sendReply()">➤</button>
    </footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCBOb3dKOpwZ3anv5N8Lqlv2x3PPuokBFg",
        authDomain: "eladim-chat-v2.firebaseapp.com",
        databaseURL: "https://eladim-chat-v2-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "eladim-chat-v2",
        storageBucket: "eladim-chat-v2.firebasestorage.app",
        messagingSenderId: "514164337891",
        appId: "1:514164337891:web:b0a098a9c063b3a2bb29d6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    let currentUser = null;
    let activeThreadId = null;

    // --- שים פה את המייל שלך! ---
    const ADMINS = ["k9361839@gmail.com"]; 

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }

    auth.onAuthStateChanged(user => {
        currentUser = user;
        if(user) {
            document.getElementById('auth-area').innerHTML = `<img src="${user.photoURL}" style="width:38px; border-radius:50%; border:2px solid #00a884;">`;
            document.getElementById('status').innerText = "מחובר כ: " + user.displayName;
        }
    });

    function addEmoji(inputId) {
        const icons = ['😊','😂','🔥','🙌','❤️','👍','😮','😢','🎉'];
        const choice = prompt("בחר אימוג'י או הקלד אחד:\n" + icons.join(' '));
        if(choice) document.getElementById(inputId).value += choice;
    }

    function sendMessage(inputId, path) {
        const text = document.getElementById(inputId).value.trim();
        if(!text || !currentUser) return;
        db.ref(path).push({
            uid: currentUser.uid, name: currentUser.displayName, text: text, timestamp: Date.now()
        });
        document.getElementById(inputId).value = "";
    }

    function sendReply() { if(activeThreadId) sendMessage('thread-input', `messages/${activeThreadId}/replies`); }

    db.ref('messages').on('value', snap => {
        const flow = document.getElementById('chat-flow');
        flow.innerHTML = "";
        snap.forEach(child => renderMessage(child, flow, 'messages'));
        flow.scrollTop = flow.scrollHeight;
    });

    function renderMessage(child, container, basePath) {
        const m = child.val();
        const id = child.key;
        const isAdmin = currentUser && ADMINS.includes(currentUser.email);
        const isOwner = currentUser && (m.uid === currentUser.uid || isAdmin);

        const div = document.createElement('div');
        div.className = `msg ${currentUser && m.uid === currentUser.uid ? 'me' : 'other'}`;
        div.innerHTML = `
            <span class="msg-user">${m.name}</span>
            <div onclick="openThread('${id}')">${m.text}</div>
            <div class="reaction-area" id="reac-${id}"></div>
            <div class="msg-tools">
                <span onclick="react('${id}', '👍', '${basePath}')">👍</span>
                <span onclick="openThread('${id}')">💬 שרשור</span>
                ${isOwner ? `<span onclick="editMsg('${id}', '${m.text}', '${basePath}')">✏️</span>` : ''}
                ${isOwner ? `<span onclick="deleteMsg('${id}', '${basePath}')">🗑️</span>` : ''}
            </div>
        `;
        container.appendChild(div);
        loadReactions(id, basePath);
    }

    function openThread(id) {
        activeThreadId = id;
        document.getElementById('thread-sidebar').classList.add('open');
        db.ref(`messages/${id}/replies`).on('value', snap => {
            const container = document.getElementById('thread-msgs');
            container.innerHTML = "";
            snap.forEach(child => renderMessage(child, container, `messages/${id}/replies`));
            container.scrollTop = container.scrollHeight;
        });
    }

    function closeThread() { document.getElementById('thread-sidebar').classList.remove('open'); }

    function react(id, emoji, path) {
        if(!currentUser) return;
        db.ref(`${path}/${id}/reactions/${emoji}/${currentUser.uid}`).set(true);
    }

    function loadReactions(id, path) {
        db.ref(`${path}/${id}/reactions`).on('value', s => {
            const area = document.getElementById('reac-'+id);
            if(!area) return;
            area.innerHTML = "";
            s.forEach(emojiGroup => {
                const count = Object.keys(emojiGroup.val()).length;
                area.innerHTML += `<div class="reac-tag">${emojiGroup.key} <b>${count}</b></div>`;
            });
        });
    }

    function deleteMsg(id, path) { if(confirm("למחוק הודעה?")) db.ref(`${path}/${id}`).remove(); }
    function editMsg(id, oldText, path) {
        const newText = prompt("ערוך הודעה:", oldText);
        if(newText) db.ref(`${path}/${id}`).update({ text: newText });
    }
</script>
</body>
</html>
